term: Vibe Coding
aliases:
  - Programmare a sensazione
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  Vibe coding è un termine coniato da Andrej Karpathy (co-fondatore di OpenAI, ex direttore AI di Tesla) a inizio 2025 per descrivere un nuovo modo di programmare: descrivi quello che vuoi in linguaggio naturale, l'AI scrive il codice, lo esegui, vedi se funziona e iteri descrivendo cambiamenti. Non leggi mai o non capisci davvero il codice. Programmi "a vibe" - a sensazione - descrivendo l'esito desiderato, non ingegnerizzando la soluzione.
key_intuition: |
  Programmazione tradizionale: sei l'architetto, il costruttore e l'ispettore. Progetti la struttura, scrivi ogni riga, fai debug di ogni errore. Vibe coding: sei il cliente che descrive a un appaltatore AI cosa vuoi costruire. "Fammi un sito con un form che invia email." L'AI scrive il codice. Tu lo testi, dici "il bottone è troppo piccolo e aggiungi una dark mode" e l'AI lo rivede. Potresti spedire un prodotto funzionante senza capire una singola riga del codice sottostante.
use_cases: Prototipazione rapida con AI; accelerare piccoli progetti; capire rischi (sicurezza, manutenibilità) del codice scritto da AI.
