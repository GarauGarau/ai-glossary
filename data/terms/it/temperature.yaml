term: Temperature
aliases: []
category: essentials
difficulty: beginner
tags:
  - essentials
  - beginner
definition: |
  La temperature è un parametro (di solito tra 0 e 2) che controlla quanto l'output del modello sia deterministico o "creativo". A ogni passo il modello calcola una distribuzione di probabilità sui possibili token successivi. La temperature modifica quella distribuzione: una temperature bassa la rende più "appuntita" (vince quasi sempre il token più probabile), una temperature alta la appiattisce (anche token meno probabili hanno una reale possibilità).
key_intuition: |
  Immagina di scegliere un ristorante. A "temperature 0" vai sempre nel tuo preferito. A "temperature 0.7" di solito scegli tra i migliori, ma a volte provi quel posto nuovo. A "temperature 1.5" potresti scegliere a caso il ristorante fusion strano all'angolo. A "temperature 2" potresti finire al distributore di benzina. Più casualità significa più creatività, ma anche più caos.
use_cases: Regolare creatività vs determinismo (bassa per codice/fatti; più alta per brainstorming/scrittura creativa).
