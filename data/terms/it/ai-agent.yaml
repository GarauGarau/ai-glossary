term: AI Agent
aliases:
  - Agentic AI
  - Agente AI
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  Un AI agent è un sistema che va oltre la risposta a un singolo prompt: può pianificare attività in più passaggi, usare strumenti esterni (motori di ricerca, API, interpreti di codice, database), eseguire azioni, osservare i risultati e adattare l'approccio. Invece di "rispondi alla mia domanda", gli dai un obiettivo (es. "analizza i concorrenti e prepara un report") e l'agente decide autonomamente quali passi fare.
key_intuition: |
  Un chatbot è come un bibliotecario che risponde alle domande da dietro un banco. Un agente è più simile a un assistente di ricerca che si alza e lavora: consulta più fonti, incrocia dati, prende appunti, scrive una bozza, capisce cosa manca, va a recuperarlo e torna con un risultato finito. L'LLM è il cervello, ma il framework dell'agente aggiunge strumenti, osservazione e la capacità di agire nel mondo.
use_cases: Automatizzare workflow in più passaggi con tool; assistenti di ricerca; esecuzione di codice; cicli di pianificazione/esecuzione.
