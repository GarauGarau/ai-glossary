term: Quantization
aliases:
  - Quantizzazione
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  La quantizzazione è una tecnica di compressione che riduce la precisione numerica dei pesi di un modello. Durante l'addestramento, i pesi sono salvati come numeri ad alta precisione (floating point a 32 bit o 16 bit). La quantizzazione li converte a precisione più bassa (8 bit, 4 bit o anche 2 bit), riducendo drasticamente la memoria necessaria e accelerando l'inferenza. L'intuizione chiave: gran parte di quella precisione è ridondante e puoi eliminarla con una perdita di qualità sorprendentemente piccola.
key_intuition: |
  Immagina una fotografia salvata alla massima qualità. Ogni pixel è memorizzato con altissima precisione. Ora salvala come JPEG compresso: il file è molto più piccolo, ma l'immagine sembra quasi identica. Comprimi ancora, e inizi a notare qualche artefatto, ma resta perfettamente utilizzabile. La quantizzazione applica lo stesso principio ai pesi del modello: riduci la precisione di ogni numero, il modello si riduce drasticamente e la perdita di qualità è spesso appena percepibile.
use_cases: Far girare modelli grandi su hardware più piccolo; ridurre memoria/latenza; esecuzione locale di modelli open source.
