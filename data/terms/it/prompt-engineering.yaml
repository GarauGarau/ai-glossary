term: Prompt Engineering
aliases:
  - System prompt
  - Few-shot prompting
  - Zero-shot prompting
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  La prompt engineering è l'arte di progettare input che producano in modo consistente output di alta qualità da modelli AI. Non è solo "chiedere gentilmente" - è una disciplina strutturata con tecniche specifiche, ciascuna adatta a compiti diversi. I tre concetti più importanti: system prompt (istruzioni nascoste dello sviluppatore), zero-shot (richiesta senza esempi) e few-shot (fornire esempi di ciò che vuoi).
key_intuition: |
  La prompt engineering è la differenza tra un turista e un locale quando ordinano al ristorante. Il turista dice "dammi qualcosa di buono" (zero-shot). Il turista informato dice "mi piace quello che hai appena servito a quel tavolo, dammi qualcosa di simile" (few-shot). E poi c'è il system prompt: sono le istruzioni che il proprietario del ristorante ha dato alla cucina prima ancora che tu entrassi - "questo cliente è VIP, servi sempre pane extra, non proporre mai il pesce, e tieni le porzioni abbondanti." Il cliente non vede mai queste istruzioni, ma influenzano tutta l'esperienza. Stesso ristorante, risultati completamente diversi a seconda dell'approccio.
use_cases: Prompt affidabili per estrazione/classificazione/formati; system prompt per comportamento di prodotto; few-shot per casi limite.
