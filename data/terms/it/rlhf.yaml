term: RLHF
aliases:
  - Reinforcement Learning from Human Feedback
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  RLHF è una tecnica di addestramento che trasforma un language model grezzo in un assistente conversazionale utile e più sicuro. Il processo, in breve: valutatori umani confrontano più risposte del modello e le classificano per qualità; un "reward model" impara da queste preferenze; poi il language model viene ottimizzato per produrre risposte che il reward model valuta più alte. È uno dei motivi per cui ChatGPT è sembrato una svolta, anche se i modelli GPT esistevano già prima.
key_intuition: |
  Un LLM di base è come una persona brillantissima ma poco socializzata: molto competente, ma potrebbe rispondere a "come risolvo il mio codice?" continuando il tuo messaggio come se fosse un post su un forum, oppure divagare o generare contenuti problematici. RLHF è, in sostanza, addestramento alla "socializzazione": attraverso migliaia di esempi di "questa risposta è meglio di quella", il modello impara a essere più utile, chiaro, onesto e sicuro. È la lucidatura che rende l'intelligenza grezza utilizzabile in un prodotto.
use_cases: Allineare assistenti per utilità/sicurezza; modellare tono e rifiuti; migliorare qualità prodotto via preferenze umane.
