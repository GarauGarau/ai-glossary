term: Neural Network
aliases:
  - Rete neurale
  - Rete neurale artificiale
category: essentials
difficulty: beginner
tags:
  - essentials
  - beginner
definition: |
  Una rete neurale è la struttura computazionale fondamentale dietro l'AI moderna. È un sistema di funzioni matematiche interconnesse organizzate in strati (layer), vagamente ispirate ai neuroni biologici. I dati entrano attraverso uno strato di input, passano per uno o più strati nascosti (hidden layer, dove i pattern vengono rilevati e combinati) e producono risultati nello strato di output. Ogni connessione tra strati ha un peso numerico (weight) che determina quanto un segnale influenza il successivo. Quando si dice che un modello ha "miliardi di parametri", si contano proprio questi pesi. Addestrare una rete neurale significa regolare quei pesi finché la rete non produce output utili.
key_intuition: |
  Immagina una catena di montaggio in una fabbrica. La materia prima (il tuo input: testo, immagine, numeri) entra da un'estremità. A ogni stazione (layer), gli operai (neuroni) esaminano il materiale e prendono decisioni semplici: "c'è una curva qui?", "questa parola segue un pattern?", "questo valore supera una soglia?". Ogni operaio passa il suo giudizio alla stazione successiva, dove altri operai combinano questi segnali semplici in valutazioni sempre più complesse. Alla fine della catena, una serie di operazioni banali ha prodotto qualcosa di sofisticato: una classificazione, una previsione, una frase generata.

  L'intuizione chiave è che nessun singolo neurone è "intelligente". L'intelligenza emerge dalla combinazione di miliardi di operazioni semplici, ciascuna calibrata dall'addestramento. Per questo la scala conta così tanto nell'AI moderna: più parametri significa combinazioni più sfumate, e quindi la rete può rappresentare pattern più complessi.
use_cases: Base per capire tutti i modelli AI moderni; comprendere perché scala e addestramento contano; ragionare su cosa l'AI può e non può imparare.
