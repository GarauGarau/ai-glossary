term: Pre-training vs Post-training
aliases:
  - Pretraining
  - Post-training
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  I modelli AI moderni sono costruiti in due fasi distinte. Pre-training: il modello legge enormi quantità di testo grezzo da internet, libri, codice - e impara i pattern generali del linguaggio. È estremamente costoso (milioni di dollari di compute) e produce un "base model" che può completare testo ma non è particolarmente utile o sicuro. Post-training: il base model viene raffinato tramite tecniche come RLHF, fine-tuning su esempi curati, safety training e instruction-following. Questo è ciò che trasforma un motore di completamento testo in un assistente utile.
key_intuition: |
  Il pre-training è come un'educazione universitaria: ampia, costosa, fondamentale. Richiede mesi e costa milioni. Il modello impara linguaggio, fatti, pattern di ragionamento e codice da trilioni di token. Ma un neolaureato non è pronto per un lavoro specifico - serve onboarding. Il post-training è quell'onboarding: imparare a seguire istruzioni, essere educato, rifiutare richieste dannose, ragionare passo dopo passo e citare fonti. Il base model può recitare Shakespeare e scrivere Python, ma potrebbe anche generare contenuti tossici o ignorare del tutto la tua domanda. Il post-training corregge questo.
use_cases: Capire capability vs alignment; scegliere fine-tuning/RLHF vs prompting; ragionare su costi e dati necessari.
