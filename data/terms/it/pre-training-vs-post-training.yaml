term: Pre-training vs Post-training
aliases:
  - Pretraining
  - Post-training
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  I modelli AI moderni sono costruiti in due fasi distinte. Pre-training: il modello legge enormi quantità di testo grezzo (internet, libri, codice) e impara i pattern generali del linguaggio. È estremamente costoso (milioni di dollari di potenza di calcolo) e produce un modello base ("base model") che sa continuare il testo ma non è ancora particolarmente utile o sicuro. Post-training: il modello base viene raffinato con tecniche come RLHF, fine-tuning su esempi curati, addestramento alla sicurezza e instruction-following (seguire istruzioni). È questo che trasforma un motore di completamento del testo in un assistente utile.
key_intuition: |
  Il pre-training è come un'educazione universitaria: ampia, costosa, fondamentale. Richiede mesi e costa milioni. Il modello impara linguaggio, fatti, pattern di ragionamento e codice da trilioni di token. Ma un neolaureato non è pronto per un lavoro specifico: serve un periodo di inserimento (onboarding). Il post-training è quell'inserimento: imparare a seguire istruzioni, essere educato, rifiutare richieste dannose, ragionare passo dopo passo e citare fonti. Il modello base può recitare Shakespeare e scrivere Python, ma potrebbe anche generare contenuti tossici o ignorare del tutto la tua domanda. Il post-training corregge questo.
use_cases: Capire differenza tra capacità e allineamento; scegliere tra fine-tuning/RLHF e prompting; ragionare su costi e dati necessari.
