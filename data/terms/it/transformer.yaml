definition: |
  Il Transformer è l'architettura di rete neurale dietro ogni grande modello AI di cui hai sentito parlare: GPT, Claude, Gemini, LLaMA, Mistral, BERT. Pubblicato nel 2017 da ricercatori di Google, ha risolto un problema fondamentale: come elaborare testo in parallelo (quindi più velocemente) mantenendo la capacità di capire relazioni tra parole lontane. La sua innovazione centrale, il meccanismo di attention, permette al modello di pesare l'importanza di ogni parola rispetto a tutte le altre simultaneamente.
key_intuition: |
  Prima dei Transformer, i modelli leggevano il testo come un essere umano che legge un rotolo: una parola alla volta, da sinistra a destra, cercando di ricordare l'inizio mentre legge la fine. I Transformer sono diversi: vedono tutto il testo in una volta, come guardare una pagina stampata, e possono tracciare connessioni tra qualsiasi due parti istantaneamente. La frase "The animal didn't cross the street because it was too tired" richiede collegare "it" ad "animal" (non a "street"). L'attention rende questa connessione esplicita e apprendibile.
use_cases: Modello mentale base per gli LLM moderni; capire attention, scaling e perché funzionano modelli come GPT o BERT.
