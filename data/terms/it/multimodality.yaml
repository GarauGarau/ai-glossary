term: Multimodality
aliases:
  - AI multimodale
  - Modelli multimodali
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  La multimodalità si riferisce a modelli AI che possono elaborare e generare più di un tipo di dato - testo, immagini, audio, video, codice - all'interno di un unico sistema. I primi LLM erano solo testo: testo in ingresso, testo in uscita. I modelli multimodali moderni (GPT-4V, Gemini, Claude con visione) possono guardare un'immagine e descriverla, leggere un grafico e rispondere a domande sui dati, oppure ascoltare audio e trascriverlo. Alcuni possono anche generare immagini o voce, non solo testo. La tendenza è verso modelli che percepiscono e producono attraverso tutte le modalità, in modo simile agli esseri umani.
key_intuition: |
  I primi modelli AI erano come qualcuno che poteva comunicare solo per telefono: brillanti con le parole, ma completamente ciechi e sordi a tutto ciò che è visivo o sonoro. Per analizzare un grafico dovevi prima descriverlo a parole. I modelli multimodali sono come passare a una videochiamata: ora possono vedere il tuo schermo, guardare la lavagna, leggere il grafico che stai indicando e rispondere sia con parole che con elementi visivi. La quantità di informazione che possono gestire aumenta enormemente.

  Questo conta nella pratica perché il mondo reale è multimodale. Un medico ha bisogno di leggere sia la descrizione del paziente sia la radiografia. Uno sviluppatore ha bisogno di vedere sia il messaggio di errore sia lo screenshot dell'interfaccia rotta. Elaborando tutti questi input insieme, i modelli multimodali possono risolvere problemi che erano impossibili quando ogni modalità viveva in un sistema separato.
use_cases: Comprensione e analisi di immagini; lettura di documenti e grafici; trascrizione audio; costruire applicazioni AI più ricche oltre il solo testo.
