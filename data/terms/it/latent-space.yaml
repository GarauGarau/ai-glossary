term: Latent Space
aliases:
  - Spazio latente
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  Lo spazio latente è la rappresentazione interna (nascosta) che un modello costruisce del suo input: uno spazio matematico ad alta dimensionalità in cui concetti e caratteristiche sono codificati come punti. Non lo puoi vedere direttamente, ma è lì che avviene gran parte dell'elaborazione. In questo spazio, concetti simili finiscono vicini; e alcune relazioni diventano operazioni geometriche: il significato astratto diventa computabile.
key_intuition: |
  Se gli embedding danno a ogni concetto una posizione su una mappa (vedi: Embedding), lo spazio latente è l'intera mappa - compreso tutto il territorio non etichettato fra un punto e l'altro. La differenza chiave: puoi muoverti nello spazio latente in modo continuo e scoprire transizioni significative. Muoviti in una direzione e un volto invecchia gradualmente; muoviti in un'altra e inizia a sorridere. Queste direzioni non sono programmate: il modello le ha scoperte dai dati.

  Nella generazione di immagini (Stable Diffusion, DALL-E), lo spazio latente è dove avviene il lavoro vero. Il modello non genera pixel direttamente: naviga dentro una rappresentazione compressa in cui muoversi in una direzione può portare da "giorno" a "notte" o da "foto" a "pittura a olio". Per questo puoi interpolare tra due immagini e ottenere stati intermedi plausibili: stai tracciando un percorso nello spazio latente.
use_cases: Capire embedding e modelli generativi; interpolare tra concetti; ragionare su representation learning.
