term: Attention Mechanism
aliases:
  - Attention
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  Il meccanismo di attention è l'operazione matematica al cuore dei Transformer. Per ogni token in input, l'attention calcola un punteggio di rilevanza rispetto a ogni altro token, creando una mappa pesata di "su cosa devo concentrarmi per capire questa parola nel contesto?". È ciò che permette al modello di risolvere ambiguità, tracciare riferimenti e capire dipendenze a lungo raggio nel testo.
key_intuition: |
  Questo esempio funziona meglio in inglese, dove il pronome "it" non ha genere e quindi e ambiguo. Leggi: "The trophy didn't fit in the suitcase because it was too big." A cosa si riferisce "it"? Al trophy (troppo grande per entrare). Ora: "The trophy didn't fit in the suitcase because it was too small." Ora "it" si riferisce alla suitcase. Hai risolto questa ambiguita istantaneamente usando comprensione contestuale. L'attention fa la stessa cosa matematicamente: calcola un punteggio tra "it" e ogni altra parola, e la parola con il peso di attention più alto contribuisce di più alla rappresentazione. In una frase domina "trophy"; nell'altra domina "suitcase".

  La multi-head attention significa che il modello esegue questo processo più volte in parallelo: ogni "head" impara tipi diversi di relazioni. Una head può seguire la struttura grammaticale, un'altra il significato semantico, un'altra la coreference (come nel nostro esempio di "it"). La combinazione crea una comprensione ricca e multidimensionale del testo.
use_cases: Capire risoluzione di riferimenti e dipendenze a lungo raggio; interpretare mappe di attention e comportamento dei Transformer.
