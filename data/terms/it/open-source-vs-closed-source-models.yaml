term: Open Source vs. Closed Source Models
aliases:
  - Modelli open source
  - Modelli closed source
  - Open weights
category: essentials
difficulty: beginner
tags:
  - essentials
  - beginner
definition: |
  I modelli closed source (GPT-4, Claude) sono accessibili solo tramite l'API o l'interfaccia dell'azienda: puoi usarli, ma non puoi vedere architettura, dati di addestramento o pesi. I modelli open source (LLaMA, Mistral, Qwen) rilasciano parte o tutto questo, permettendo a chiunque di scaricarli, eseguirli, modificarli e costruirci sopra. Questa distinzione plasma l'intero ecosistema AI: chi controlla i modelli, chi può competere e chi può fare audit sulla sicurezza.
key_intuition: |
  Il closed source è come un ristorante: mangi il cibo, ma non ottieni la ricetta e non puoi modificarla. L'open source è come un ricettario pubblicato: puoi cucinare a casa, cambiare gli ingredienti o aprire il tuo ristorante. Il compromesso? Il ristorante ha chef professionisti e controllo qualità. Il ricettario ti dà libertà ma nessuna garanzia.
use_cases: Decidere tra servizio gestito e self-hosting; auditabilità e compliance; vincoli di licenza e messa in produzione; controllo dei costi.
