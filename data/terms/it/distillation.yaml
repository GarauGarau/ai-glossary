term: Distillation
aliases:
  - Knowledge distillation
  - Distillazione
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  La distillazione è una tecnica in cui un modello più piccolo (lo "student") viene addestrato a replicare il comportamento di un modello più grande (il "teacher"). Invece di imparare solo da dati grezzi (testo da internet), lo student impara dagli output del teacher: distribuzioni di probabilità, pattern di ragionamento e stile di risposta. Il risultato è un modello che mantiene l'80-90% della qualità del teacher con una frazione di dimensione e costo, ed è spesso molto più veloce.
key_intuition: |
  Immagina uno chef maestro che ha passato 30 anni a sviluppare le sue competenze (il modello grande). Ora immagina che scriva non solo le ricette, ma anche il suo processo mentale: perché aggiunge sale in quel momento, come giudica la temperatura dal suono, quando infrange le regole. Un apprendista (il modello piccolo) che studia queste annotazioni impara molto più in fretta di uno che legge semplicemente gli stessi ricettari che il maestro aveva letto anni prima. Questa è distillazione: imparare da qualcuno che già sa farlo, invece di ripartire da zero.
use_cases: Creare modelli più piccoli/veloci; ridurre costi/latenza; deploy on-device; produrre varianti "mini".
