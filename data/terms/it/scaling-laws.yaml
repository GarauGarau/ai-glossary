term: Scaling Laws
aliases:
  - Leggi di scaling
  - Chinchilla scaling
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  Le scaling law sono scoperte empiriche che mostrano come le prestazioni di un modello AI migliorino in modo prevedibile aumentando tre fattori: il numero di parametri, la quantità di dati di addestramento e il budget di calcolo (compute). La relazione segue una legge di potenza: raddoppia il compute e ottieni un miglioramento misurabile e costante - non un salto improvviso, ma una curva liscia e prevedibile. Queste leggi, documentate rigorosamente da Kaplan et al. (2020) di OpenAI e raffinate da Hoffmann et al. (2022) di DeepMind (il paper "Chinchilla"), hanno dato all'industria una roadmap: se puoi permetterti più compute, puoi prevedere quanto migliorerà il modello.
key_intuition: |
  Le scaling law sono il motivo per cui la corsa all'AI è fondamentalmente una corsa alle risorse. Immagina di scoprire che, per un certo tipo di fabbrica, raddoppiare l'investimento raddoppia affidabilmente la qualità della produzione - non a volte, non approssimativamente, ma con prevedibilità matematica. Investiresti tutto il possibile. È esattamente ciò che è successo nell'AI. Una volta che i laboratori hanno dimostrato che più compute = modelli prevedibilmente migliori, la corsa a costruire cluster sempre più grandi è diventata inevitabile.

  L'intuizione di Chinchilla ha aggiunto una sfumatura cruciale: non basta costruire un modello più grande. Un modello da 70 miliardi di parametri addestrato sulla giusta quantità di dati può superare un modello da 175 miliardi addestrato su troppo pochi dati. La strategia ottimale bilancia dimensione del modello e quantità di dati per un dato budget di calcolo. Per questo "addestramento compute-ottimale" è diventato un mantra e perché qualità e quantità dei dati contano tanto quanto la dimensione del modello.
use_cases: Capire l'economia dell'addestramento AI; prevedere miglioramenti dei modelli; ragionare su training compute-ottimale e perché i modelli più grandi non sono sempre i migliori.
