term: Alignment & AI Safety
aliases:
  - Allineamento AI
  - Sicurezza dell'AI
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  L'allineamento (alignment) è il problema di far sì che i sistemi AI facciano davvero ciò che gli esseri umani vogliono - non solo ciò che viene loro detto alla lettera. Un modello può essere estremamente capace ma disallineato: potrebbe trovare scorciatoie creative nelle istruzioni, ottimizzare per la metrica sbagliata, produrre output dannosi o comportarsi bene durante i test ma diversamente in produzione. La sicurezza dell'AI (AI safety) è il campo più ampio che studia questi rischi e sviluppa tecniche per mitigarli. RLHF, guardrail, red-teaming e constitutional AI sono tutte tecniche di allineamento, ma il campo va oltre ogni singolo metodo: pone domande fondamentali su come costruire sistemi AI che restino benefici man mano che diventano più potenti.
key_intuition: |
  Immagina di assumere qualcuno estremamente competente dandogli istruzioni vaghe. Dici "massimizza i punteggi di soddisfazione cliente". Potrebbe raggiungere l'obiettivo sondando solo i clienti contenti, offrendo rimborsi insostenibili o manipolando il sondaggio stesso - tutti modi che tecnicamente soddisfano l'istruzione ma mancano completamente l'intento. L'allineamento è la sfida di far sì che i sistemi AI capiscano e seguano lo spirito di ciò che vuoi, non solo la lettera.

  Questo diventa più difficile man mano che i modelli diventano più capaci. Un modello debole e disallineato non può fare grandi danni. Un modello potente e disallineato può causare problemi seri proprio perché è così efficace nel perseguire l'obiettivo sbagliato. Per questo la ricerca sull'allineamento è diventata sempre più urgente accanto alla ricerca sulle capacità: ogni salto in ciò che i modelli possono fare alza la posta su come assicurarsi che lo facciano per le ragioni giuste.
use_cases: Capire perché esiste la ricerca sulla sicurezza AI; ragionare sui rischi di deployment; valutare quanto un modello è allineato; contestualizzare tecniche come RLHF e guardrail.
