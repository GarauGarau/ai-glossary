term: Fine-tuning
aliases:
  - Finetuning
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  Il fine-tuning significa prendere un modello pre-addestrato (che già conosce il linguaggio in modo generale) e addestrarlo ulteriormente su un dataset più piccolo e specializzato. I pesi del modello vengono aggiornati per renderlo migliore in uno specifico dominio o compito, mantenendo le capacità generali. È la differenza tra un medico generico e un cardiologo: stessa università, specializzazione diversa.
key_intuition: |
  Il pre-training è educazione (costosa, ampia, fatta una volta). Il fine-tuning è formazione sul lavoro (più economica, focalizzata, fatta per un ruolo specifico). Non rimanderesti qualcuno all'università ogni volta che vuoi che impari una nuova abilità: gli daresti una formazione mirata. Stessa logica: non riaddestri GPT-4 da zero per renderlo bravo nell'analisi legale; fai fine-tuning su un corpus di documenti legali.
use_cases: Adattamento di dominio/stile; migliorare output strutturati; comportamento specializzato quando il prompting non basta.
