term: Test-Time Compute
aliases:
  - Inference-time scaling
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  Test-time compute è l'idea (che cambia paradigma) che puoi rendere un modello AI "più intelligente" non facendolo più grande o addestrandolo più a lungo, ma dandogli più tempo e compute per pensare al momento dell'inferenza (quando sta generando la risposta). Invece di scalare la dimensione del modello (strategia dominante per anni), scali lo sforzo di pensiero per domanda. È il principio dietro i modelli o1/o3 di OpenAI e la funzione di extended thinking di Anthropic.
key_intuition: |
  Scaling tradizionale: costruire un cervello più grande (più parametri). Test-time compute: lasciare lo stesso cervello pensare più forte e più a lungo. Pensa a un giocatore di scacchi: puoi renderlo migliore insegnandogli più aperture (training). Oppure puoi dargli più tempo per mossa (test-time compute). Un grande maestro con 30 secondi per mossa giocherà peggio dello stesso grande maestro con 30 minuti per mossa. Il test-time compute dà ai modelli AI i loro "30 minuti" permettendo di generare catene di ragionamento, esplorare alternative, verificare il lavoro e auto-correggersi prima di consegnare la risposta finale.

  Questo cambia l'economia dell'AI: invece di un costo fisso per query, ora puoi scegliere quanto "spendere" su ogni domanda. Domanda semplice? Risposta veloce, costo basso. Dimostrazione matematica complessa? Il modello pensa per 2 minuti, usa internamente 50x token, ma produce una risposta corretta che altrimenti non avrebbe raggiunto.
use_cases: Scaling in inferenza per domande difficili; tradeoff qualità-costo; impostazioni di reasoning/extended thinking.
