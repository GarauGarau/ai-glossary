term: Prompt Engineering
aliases:
  - System prompt
  - Few-shot prompting
  - Zero-shot prompting
category: intermediate
difficulty: intermediate
tags:
  - intermediate
definition: |
  Prompt engineering is the craft of designing inputs that consistently produce high-quality outputs from AI models. It's not just "asking nicely" - it's a structured discipline with specific techniques, each suited to different tasks. The three most important concepts: system prompts (hidden developer instructions), zero-shot (asking with no examples), and few-shot (providing examples of what you want).
key_intuition: |
  Prompt engineering is the difference between a tourist and a local when ordering at a restaurant. The tourist says "give me something good" (zero-shot). The informed tourist says "I like what you just served that table, give me something like that" (few-shot). The local says "I'm a regular, you know I'm vegetarian, I like spicy food, and I'm in a hurry" (system prompt + context). Same restaurant, wildly different experience.
use_cases: Reliable prompting for extraction/classification/formatting; system prompts for product behavior; few-shot for edge cases.
