term: Quantization
aliases:
  - Quantisation
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  Quantization is a compression technique that reduces the numerical precision of a model's weights. During training, weights are stored as high-precision numbers (32-bit or 16-bit floating point). Quantization converts these to lower precision (8-bit, 4-bit, or even 2-bit), dramatically reducing the model's memory footprint and speeding up inference. The key insight: most of that precision is redundant, and you can throw it away with surprisingly little quality loss.
key_intuition: |
  Imagine a photograph saved at maximum quality. Every pixel is stored with very high precision. Now save it as a compressed JPEG: the file is much smaller, but the image still looks nearly identical. Compress it further, and you start to notice some artifacts, but it's still perfectly usable. Quantization applies the same principle to model weights: reduce the precision of each number, the model shrinks dramatically, and the quality loss is often barely noticeable.
use_cases: Running large models on smaller hardware; reducing memory/latency; local deployment of open models.
