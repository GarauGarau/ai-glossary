term: Quantization
aliases:
  - Quantisation
category: deep-dive
difficulty: advanced
tags:
  - deep-dive
  - advanced
definition: |
  Quantization is a compression technique that reduces the numerical precision of a model's weights. During training, weights are stored as high-precision numbers (32-bit or 16-bit floating point). Quantization converts these to lower precision (8-bit, 4-bit, or even 2-bit), dramatically reducing the model's memory footprint and speeding up inference. The key insight: most of that precision is redundant, and you can throw it away with surprisingly little quality loss.
key_intuition: |
  Imagine a photograph. At full resolution (32-bit), every pixel has billions of possible colors. If you reduce it to 256 colors (8-bit), you lose some subtle gradients, but the image is still clearly recognizable and 4x smaller. Reduce to 16 colors (4-bit)? It's grainier, but you can still tell what it is and it's 8x smaller. Quantization does the same thing to model weights: each number gets fewer bits, the model shrinks dramatically, and the quality loss is often barely noticeable.
use_cases: Running large models on smaller hardware; reducing memory/latency; local deployment of open models.
